<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PWA Debug</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6777ef">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f5f5;
        }

        .status {
            background: white;
            padding: 20px;
            margin: 10px 0;
            border-radius: 8px;
            border-left: 4px solid #6777ef;
        }

        .status.error {
            border-left-color: #ff6b6b;
            background: #ffe0e0;
        }

        .status.success {
            border-left-color: #51cf66;
            background: #e6ffed;
        }

        code {
            background: #f0f0f0;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: monospace;
        }

        button {
            background: #6777ef;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin: 5px 0;
        }

        button:hover {
            background: #5a6fdb;
        }

    </style>
</head>

<body>
    <h1>🔧 PWA Debug Status</h1>

    <div id="debug-container"></div>

    <h2>Actions:</h2>
    <button onclick="registerSW()">Register Service Worker</button>
    <button onclick="unregisterSW()">Unregister Service Worker</button>
    <button onclick="clearCache()">Clear All Caches</button>
    <button onclick="location.reload()">Reload Page</button>

    <script>
        const debugContainer = document.getElementById('debug-container');

        function log(title, message, isError = false) {
            const div = document.createElement('div');
            div.className = `status ${isError ? 'error' : 'success'}`;
            div.innerHTML = `<strong>${title}:</strong><br>${message}`;
            debugContainer.appendChild(div);
            console.log(title, message);
        }

        async function checkPWA() {
            // Check manifest
            try {
                const response = await fetch('manifest.json');
                if (response.ok) {
                    const manifest = await response.json();
                    log('✅ Manifest',
                        `Loaded successfully<br>Name: ${manifest.name}<br>Display: ${manifest.display}`);
                } else {
                    log('❌ Manifest', `Failed to load: ${response.statusText}`, true);
                }
            } catch (e) {
                log('❌ Manifest', `Error: ${e.message}`, true);
            }

            // Check Service Worker
            if ('serviceWorker' in navigator) {
                log('✅ Service Worker API', 'Supported');
                try {
                    const registrations = await navigator.serviceWorker.getRegistrations();
                    if (registrations.length > 0) {
                        log('✅ Service Worker', `${registrations.length} registration(s) found`);
                    } else {
                        log('⚠️ Service Worker', 'No registrations found', true);
                    }
                } catch (e) {
                    log('❌ Service Worker', `Error: ${e.message}`, true);
                }
            } else {
                log('❌ Service Worker API', 'Not supported', true);
            }

            // Check WebApp Install Banner
            if ('BeforeInstallPromptEvent' in window) {
                log('✅ Install Prompt', 'BeforeInstallPromptEvent supported');
            } else {
                log('⚠️ Install Prompt',
                    'BeforeInstallPromptEvent not available (may be already installed or on iOS)', true);
            }

            // Check PWA Install
            if (window.matchMedia('(display-mode: standalone)').matches) {
                log('✅ Standalone Mode', 'App is running in standalone mode');
            } else {
                log('⚠️ Standalone Mode', 'App is not in standalone mode');
            }

            // Check HTTPS (required for production)
            if (location.protocol === 'https:' || location.hostname === 'localhost' || location.hostname ===
                '127.0.0.1') {
                log('✅ HTTPS/Localhost', 'Good for development/production');
            } else {
                log('❌ HTTPS Required', 'Service Workers require HTTPS in production', true);
            }
        }

        async function registerSW() {
            try {
                const registration = await navigator.serviceWorker.register('/sw.js', {
                    scope: '/'
                });
                log('✅ SW Registered', `Scope: ${registration.scope}`);
            } catch (e) {
                log('❌ SW Registration Failed', e.message, true);
            }
        }

        async function unregisterSW() {
            try {
                const registrations = await navigator.serviceWorker.getRegistrations();
                for (let reg of registrations) {
                    await reg.unregister();
                }
                log('✅ SW Unregistered', 'All service workers unregistered');
            } catch (e) {
                log('❌ Unregister Failed', e.message, true);
            }
        }

        async function clearCache() {
            try {
                const cacheNames = await caches.keys();
                for (let name of cacheNames) {
                    await caches.delete(name);
                }
                log('✅ Cache Cleared', `Deleted ${cacheNames.length} cache(s)`);
            } catch (e) {
                log('❌ Clear Cache Failed', e.message, true);
            }
        }

        // Run checks on load
        window.addEventListener('load', checkPWA);

    </script>
</body>

</html>
